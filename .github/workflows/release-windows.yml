# 推送以 v 开头的 tag（如 v0.1.0）时，在 Windows 上构建并上传到 GitHub Release
name: Release Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Add Go bin to PATH
        shell: pwsh
        run: |
          "$(go env GOPATH)/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Wails build
        run: wails build

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = "dist/windsurf-tools-wails-windows-amd64.zip"
          Compress-Archive -Path "build/bin/windsurf-tools-wails.exe" -DestinationPath $zip -Force
          Get-Item $zip | Format-List Name, Length

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windsurf-tools-wails-windows-amd64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
